name: Setup Ollama judge
description: Install Ollama, restore cached models, pull gemma3:4b (renamer) + qwen3.5:4b (judge), and start the server.

runs:
  using: composite
  steps:
    - name: Restore Ollama model cache
      uses: actions/cache@v4
      with:
        path: ~/.ollama/models
        key: ollama-gemma3-4b-qwen35-4b-v1

    - name: Install Ollama
      shell: bash
      run: curl -fsSL https://ollama.com/install.sh | sh

    - name: Start Ollama server
      shell: bash
      run: |
        ollama serve &
        sleep 3

    - name: Pull gemma3:4b (renamer)
      shell: bash
      run: ollama pull gemma3:4b

    - name: Pull qwen3.5:4b (judge)
      shell: bash
      run: ollama pull qwen3.5:4b

    - name: Warm up models
      shell: bash
      run: |
        # First inference loads each model into memory; do it now so the test's
        # own HTTP timeout doesn't fire while Ollama is still cold-starting.
        for model in gemma3:4b qwen3.5:4b; do
          curl -fsS --max-time 300 http://localhost:11434/v1/chat/completions \
            -H 'Content-Type: application/json' \
            -d "{\"model\":\"$model\",\"messages\":[{\"role\":\"user\",\"content\":\"ok\"}],\"max_tokens\":1}" \
            > /dev/null
        done
